<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQLUES - Elite Roster (Official Sync)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Kanit:wght@200;400&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #f7a322;
            --secondary: #e74c3c;
            --bg-dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', 'Kanit', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(247, 163, 34, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(247, 163, 34, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        .main-header { text-align: center; margin-bottom: 60px; }
        .main-header h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 8vw, 4.5rem);
            margin: 0; letter-spacing: 15px;
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* Admin UI */
        #adminPanel { background: #111; border: 1px solid var(--primary); padding: 20px; margin-bottom: 40px; display: none; }
        .admin-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; }
        .admin-form input, .admin-form select { background: #000; border: 1px solid #333; color: #fff; padding: 8px; outline: none; }
        .btn-add { background: var(--primary); color: #000; border: none; padding: 8px 20px; font-weight: bold; cursor: pointer; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .search-box { position: relative; width: 300px; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.03); border: none;
            border-bottom: 2px solid var(--border-color); padding: 10px 40px 10px 10px;
            color: #fff; outline: none; transition: 0.3s;
        }
        
        .section-title { font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 4px; color: #555; margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, #222, transparent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .member-card {
            background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px;
            display: flex; align-items: center; gap: 15px; position: relative; backdrop-filter: blur(10px);
        }
        .avatar-box { width: 60px; height: 60px; border-radius: 4px; background-size: cover; background-position: center; background-image: url('https://img5.pic.in.th/file/secure-sv1/Untitled-2320778d69d8713879.png'); }
        .name { font-family: 'Orbitron'; font-size: 1rem; margin: 0; color: #eee; }
        .delete-btn { color: var(--secondary); cursor: pointer; border: none; background: none; margin-left: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="container">
        <header class="main-header">
            <h1>CALVYN</h1>
            <div style="color: var(--primary); font-size: 0.8rem; letter-spacing: 5px;">DATABASE SYNC ACTIVE</div>
        </header>

        <div id="adminPanel">
            <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; margin: 0 0 15px 0; color: var(--primary);">ADMIN SYSTEM</h3>
            <div class="admin-form">
                <input type="text" id="newName" placeholder="OPERATIVE NAME">
                <input type="text" id="newFB" placeholder="FACEBOOK URL">
                <select id="newRole">
                    <option value="founder">Founder</option>
                    <option value="leader">Leader</option>
                    <option value="member" selected>Member</option>
                </select>
                <button class="btn-add" onclick="saveToDatabase()">ADD DATA</button>
            </div>
            <button onclick="logoutAdmin()" style="margin-top: 15px; color: #444; background: none; border: none; cursor: pointer;">[ DISCONNECT ]</button>
        </div>

        <div class="top-bar">
            <div class="search-box">
                <input type="text" id="memberSearch" placeholder="SEARCH..." onkeyup="searchFunction()">
            </div>
            <button onclick="loginAdmin()" id="adminBtn" style="background: none; border: 1px solid #333; color: #555; padding: 5px 15px; cursor: pointer;">ADMIN</button>
        </div>

        <div class="section-title">01_FOUNDERS</div>
        <div class="grid" id="founderGrid"></div>

        <div class="section-title">02_COMMANDERS</div>
        <div class="grid" id="leaderGrid"></div>

        <div class="section-title">03_OPERATIVES</div>
        <div class="grid" id="memberGrid"></div>
    </div>

    <script>
        // --- ส่วนการตั้งค่าฐานข้อมูล ---
        const firebaseConfig = {
            databaseURL: "https://calvyn-999ea-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdminLoggedIn = false;

        // ดึงข้อมูล Real-time
        db.ref('roster').on('value', (snapshot) => {
            const data = snapshot.val();
            renderRoster(data);
        });

        function renderRoster(data) {
            const grids = { founder: document.getElementById('founderGrid'), leader: document.getElementById('leaderGrid'), member: document.getElementById('memberGrid') };
            Object.values(grids).forEach(g => g.innerHTML = "");
            if (!data) return;

            Object.keys(data).forEach(id => {
                const item = data[id];
                const card = `
                    <div class="member-card" data-name="${item.name}">
                        <div class="avatar-box"></div>
                        <div class="info">
                            <span style="font-size: 0.6rem; color: var(--primary)">${item.role.toUpperCase()}</span>
                            <h4 class="name">${item.name}</h4>
                            <a href="${item.fb}" target="_blank" style="font-size: 0.7rem; color: #555;">FB PROFILE</a>
                        </div>
                        ${isAdminLoggedIn ? `<button class="delete-btn" onclick="deleteMember('${id}')"><i class="fas fa-trash"></i></button>` : ''}
                    </div>`;
                if(grids[item.role]) grids[item.role].innerHTML += card;
            });
        }

        function loginAdmin() {
            const user = prompt("User:");
            const pass = prompt("Pass:");
            if (user === "calvyn" && pass === "0808") {
                isAdminLoggedIn = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminBtn').classList.add('hidden');
                db.ref('roster').once('value', s => renderRoster(s.val()));
            }
        }

        function logoutAdmin() { location.reload(); }

        function saveToDatabase() {
            const name = document.getElementById('newName').value;
            const fb = document.getElementById('newFB').value;
            const role = document.getElementById('newRole').value;
            if (name && fb) {
                db.ref('roster').push({ name, fb, role });
                document.getElementById('newName').value = "";
                document.getElementById('newFB').value = "";
            }
        }

        function deleteMember(id) {
            if (confirm("ลบรายชื่อนี้?")) db.ref('roster/' + id).remove();
        }

        function searchFunction() {
            const filter = document.getElementById('memberSearch').value.toUpperCase();
            const cards = document.getElementsByClassName('member-card');
            for (let card of cards) {
                card.style.display = card.getAttribute('data-name').toUpperCase().includes(filter) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
