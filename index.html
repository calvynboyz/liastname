<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQLUES - Elite Roster Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Kanit:wght@200;400&family=Mitr:wght@300&family=Chakra+Petch:wght@300&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #f3d48b;
            --bg-dark: #121212;
            --admin-box-bg: rgba(26, 13, 13, 0.95);
            --danger: #ff0000;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: #fff;
            font-family: 'Rajdhani', 'Kanit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.8s ease;
            overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; width: 100%; }

        /* --- Navbar Smooth --- */
        nav { display: flex; justify-content: space-between; padding: 20px 40px; background: rgba(0,0,0,0.7); align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        #brand-name { font-weight: bold; letter-spacing: 2px; transition: var(--transition); }
        nav button { background: none; border: none; color: #888; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; transition: var(--transition); position: relative; padding: 5px 0; }
        nav button::after { content: ""; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: var(--primary); transition: var(--transition); transform: translateX(-50%); }
        nav button.active { color: white; }
        nav button.active::after { width: 100%; }

        /* --- View Animation --- */
        section { animation: fadeInSlide 0.6s ease-out forwards; }
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Admin UI --- */
        .login-card { background-color: var(--admin-box-bg); width: 100%; max-width: 400px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); text-align: center; }
        .input-group input, .input-group select { width: 100%; background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; color: white; outline: none; transition: var(--transition); }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(243, 212, 139, 0.2); }

        /* --- Member Card Smooth --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .member-card { 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; 
            display: flex; align-items: center; gap: 15px; position: relative; backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        .member-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 15px rgba(243, 212, 139, 0.1);
        }
        .avatar { width: 65px; height: 65px; border-radius: 8px; background-size: cover; background-position: center; border: 2px solid rgba(243, 212, 139, 0.4); transition: var(--transition); }
        .member-card:hover .avatar { border-color: var(--primary); transform: scale(1.05); }

        /* --- Music Player Smooth --- */
        .bottom-ui { position: fixed; bottom: 30px; right: 30px; z-index: 1000; transition: var(--transition); }
        .music-mini-player { 
            display: flex; align-items: center; background: rgba(20, 20, 20, 0.9); 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 6px; width: 250px; 
            cursor: pointer; backdrop-filter: blur(10px); transition: var(--transition);
            border-radius: 5px;
        }
        .music-mini-player:hover { background: rgba(30, 30, 30, 0.95); transform: translateY(-3px); border-color: var(--primary); }
        
        .full-player { 
            position: fixed; bottom: 30px; right: 30px; width: 320px; 
            background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; display: none; flex-direction: column; 
            z-index: 1100; backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 15px;
            animation: playerPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes playerPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* --- Custom UI --- */
        .toast { 
            background: var(--primary); color: #000; padding: 12px 25px; border-radius: 8px; 
            margin-bottom: 10px; font-weight: bold; font-family: 'Orbitron'; font-size: 0.8rem; 
            transform: translateX(120%); transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }
        .toast.show { transform: translateX(0); }
        
        #modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); 
            z-index: 10000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal { 
            background: #1a0d0d; border: 2px solid var(--primary); padding: 30px; 
            border-radius: 20px; max-width: 400px; width: 90%; text-align: center;
            transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div id="brand-name" style="font-family: 'Orbitron';">CALVYN</div>
        <div style="display: flex; gap: 20px;">
            <button onclick="showView('memberView')" id="navMembers" class="active">MEMBERS</button>
            <button onclick="showView('adminLoginView')" id="navAdmin">ADMIN</button>
        </div>
    </nav>

    <div id="toast-container" style="position: fixed; top: 100px; right: 20px; z-index: 9999;"></div>

    <div id="modal-overlay">
        <div class="modal" id="confirmModal">
            <h3>TERMINATE OPERATIVE?</h3>
            <p id="modal-text" style="color: #888; font-size: 0.9rem;"></p>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 25px;">
                <button onclick="closeModal()" style="padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; background:#333; color:white; font-family:'Orbitron'; font-size:0.7rem;">CANCEL</button>
                <button id="confirm-delete-btn" style="padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; background:var(--danger); color:white; font-family:'Orbitron'; font-size:0.7rem; font-weight:bold;">CONFIRM</button>
            </div>
        </div>
    </div>

    <div class="container">
        <section id="adminLoginView" class="hidden" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh;">
            <div class="login-card">
                <h2 style="font-family: 'Orbitron'; margin-bottom: 30px; color: var(--primary);">ADMIN LOGIN</h2>
                <div class="input-group" style="text-align: left; margin-bottom: 15px;">
                    <label style="color:#888; font-size:0.8rem;">Username</label>
                    <input type="text" id="loginUser">
                </div>
                <div class="input-group" style="text-align: left; margin-bottom: 25px;">
                    <label style="color:#888; font-size:0.8rem;">Password</label>
                    <input type="password" id="loginPass">
                </div>
                <button onclick="handleLogin()" style="width: 100%; background: var(--primary); border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s;">CONNECT</button>
            </div>
        </section>

        <section id="memberView">
            <div id="adminPanel" class="hidden" style="background: var(--admin-box-bg); padding: 25px; border-radius: 15px; margin-bottom: 40px; border: 1px solid var(--primary); animation: fadeInSlide 0.5s ease;">
                <h3 style="color: var(--primary); margin-top: 0; font-family: 'Orbitron'; font-size: 0.9rem; margin-bottom: 20px;">DASHBOARD CONTROL</h3>
                
                <div style="border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="editBrand" placeholder="Brand Name" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;">
                        <select id="editFont" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;">
                            <option value="'Orbitron', sans-serif">Font: Orbitron</option>
                            <option value="'Kanit', sans-serif">Font: Kanit</option>
                            <option value="'Rajdhani', sans-serif">Font: Rajdhani</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="editBG" placeholder="Background URL" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;">
                        <input type="text" id="editMusic" placeholder="YouTube Video ID" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;">
                    </div>
                    <button onclick="updateSettings()" style="width: 100%; background: #444; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.65rem; transition: 0.3s;">UPDATE SYSTEM SETTINGS</button>
                </div>

                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="newName" placeholder="Member Name" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px; flex: 1;">
                    <input type="text" id="newImg" placeholder="Avatar URL" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px; flex: 1;">
                    <input type="text" id="newFB" placeholder="Facebook URL" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px; flex: 1;">
                    <select id="newRole" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;">
                        <option value="founder">Founder</option>
                        <option value="leader">Leader</option>
                        <option value="member" selected>Member</option>
                    </select>
                    <button onclick="saveToDB()" style="background: var(--primary); border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 0.65rem;">ADD MEMBER</button>
                </div>
            </div>

            <div class="grid" id="mainGrid"></div>
        </section>
    </div>

    <div class="bottom-ui">
        <div class="music-mini-player" id="miniPlayer" onclick="togglePlayer()">
            <img src="https://i.ytimg.com/vi/XXYlFuWEuKI/maxresdefault.jpg" class="mini-art" id="miniArt">
            <div class="mini-info">
                <span class="mini-title" id="displayTitle">STARBOY</span>
                <span class="mini-artist" id="displayArtist">THE WEEKND</span>
            </div>
            <div style="padding: 0 10px; color: #fff; font-size: 0.7rem;"><i class="fa-solid fa-caret-up"></i></div>
        </div>

        <div class="full-player" id="fullPlayer">
            <div class="player-header">
                <span style="cursor: pointer;" onclick="togglePlayer()"><i class="fa-solid fa-xmark"></i> HIDE</span>
                <span style="color:var(--danger); display:flex; align-items:center; gap:5px;"><i class="fa-solid fa-circle" style="font-size:4px;"></i> LIVE</span>
            </div>
            <img src="" class="full-art" id="fullArt" style="width:100%; border-radius:10px; margin-bottom:15px;">
            <div style="text-align:center; margin-bottom:20px;">
                <h2 id="fullTitle" style="font-family:'Orbitron'; font-size:0.9rem; margin:0 0 5px 0;">STARBOY</h2>
                <p id="fullArtist" style="font-size:0.6rem; color:#666; margin:0;">THE WEEKND FT. DAFT PUNK</p>
            </div>
            <div style="width:100%; height:2px; background:#222; margin-bottom:15px; cursor:pointer;" onclick="seek(event)">
                <div id="progressLine" style="height:100%; background:var(--danger); width:0%; transition: width 0.5s linear;"></div>
            </div>
            <div style="display:flex; justify-content:center; margin-bottom:15px;">
                <button onclick="togglePlay()" style="background:#fff; color:#000; width:50px; height:50px; border-radius:50%; border:none; cursor:pointer; transition:0.3s;"><i class="fa-solid fa-play" id="playIcon"></i></button>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fa-solid fa-volume-low" style="font-size:0.7rem; color:#444;"></i>
                <input type="range" min="0" max="100" value="20" oninput="changeVolume(this.value)" style="flex:1; accent-color:#555;">
            </div>
        </div>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        // --- 1. Firebase & Setup ---
        const firebaseConfig = { databaseURL: "https://calvyn-999ea-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false;
        let player, isPlaying = false, pendingDeleteId = null;

        // --- 2. Smooth UI Helpers ---
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function openModal(id, name) {
            pendingDeleteId = id;
            document.getElementById('modal-text').innerText = `TERMINATE OPERATIVE: ${name.toUpperCase()}?`;
            const overlay = document.getElementById('modal-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { 
                overlay.style.opacity = '1';
                document.getElementById('confirmModal').style.transform = 'scale(1)';
            }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.style.opacity = '0';
            document.getElementById('confirmModal').style.transform = 'scale(0.8)';
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        document.getElementById('confirm-delete-btn').onclick = () => {
            if(pendingDeleteId) {
                db.ref('roster/' + pendingDeleteId).remove();
                showToast("OPERATIVE REMOVED");
                closeModal();
            }
        };

        // --- 3. YouTube API ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);

        function onYouTubeIframeAPIReady() {
            db.ref('settings/musicUrl').once('value', snapshot => {
                const vidId = snapshot.val() || 'XXYlFuWEuKI';
                player = new YT.Player('yt-player', {
                    height: '0', width: '0', videoId: vidId,
                    playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': vidId },
                    events: {
                        'onReady': (e) => { e.target.setVolume(20); updateProgress(); },
                        'onStateChange': (e) => {
                            isPlaying = (e.data == YT.PlayerState.PLAYING);
                            document.getElementById('playIcon').className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
                        }
                    }
                });
            });
        }

        function togglePlayer() {
            const mini = document.getElementById('miniPlayer');
            const full = document.getElementById('fullPlayer');
            const isOpen = full.style.display === "flex";
            full.style.display = isOpen ? "none" : "flex";
            mini.style.opacity = isOpen ? "1" : "0";
        }

        function togglePlay() { isPlaying ? player.pauseVideo() : player.playVideo(); }
        function changeVolume(v) { if(player) player.setVolume(v); }
        function seek(e) { player.seekTo(player.getDuration() * (e.offsetX / e.currentTarget.offsetWidth)); }

        function updateProgress() {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const perc = (player.getCurrentTime() / player.getDuration()) * 100;
                    document.getElementById('progressLine').style.width = perc + "%";
                }
            }, 1000);
        }

        // --- 4. Database Sync ---
        db.ref('settings').on('value', (snapshot) => {
            const s = snapshot.val() || {};
            const b = document.getElementById('brand-name');
            b.innerText = s.brandName || "CALVYN";
            b.style.fontFamily = s.fontFamily || "'Orbitron'";
            document.body.style.backgroundImage = s.bgUrl ? `url('${s.bgUrl}')` : "url('https://img1.pic.in.th/images/calvyn.png')";
            
            if(s.musicUrl && player && player.loadVideoById) {
                if(player.getVideoData().video_id !== s.musicUrl) {
                    player.loadVideoById(s.musicUrl);
                    const img = `https://i.ytimg.com/vi/${s.musicUrl}/maxresdefault.jpg`;
                    document.getElementById('miniArt').src = img;
                    document.getElementById('fullArt').src = img;
                }
            }
        });

        db.ref('roster').on('value', (snapshot) => {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            const data = snapshot.val();
            if (!data) return;
            Object.keys(data).forEach((id, index) => {
                const item = data[id];
                const card = document.createElement('div');
                card.className = 'member-card';
                card.style.animationDelay = (index * 0.05) + 's';
                card.innerHTML = `
                    <div class="avatar" style="background-image: url('${item.img || ''}')"></div>
                    <div class="info">
                        <div style="font-size: 0.6rem; color: var(--primary); font-family: 'Orbitron';">${item.role.toUpperCase()}</div>
                        <div class="name">${item.name}</div>
                        <a href="${item.fb}" target="_blank" style="color: #555; text-decoration: none; font-size: 0.75rem; transition:0.3s;">FB PROFILE</a>
                    </div>
                    ${isAdmin ? `<button class="delete-btn" onclick="openModal('${id}', '${item.name}')"><i class="fas fa-trash-alt"></i></button>` : ''}
                `;
                grid.appendChild(card);
            });
        });

        function updateSettings() {
            db.ref('settings').update({
                brandName: document.getElementById('editBrand').value || "CALVYN",
                fontFamily: document.getElementById('editFont').value,
                bgUrl: document.getElementById('editBG').value,
                musicUrl: document.getElementById('editMusic').value
            });
            showToast("SYSTEM SETTINGS SYNCED");
        }

        function saveToDB() {
            const name = document.getElementById('newName').value;
            if (name) {
                db.ref('roster').push({
                    name, img: document.getElementById('newImg').value,
                    fb: document.getElementById('newFB').value,
                    role: document.getElementById('newRole').value
                });
                ['newName','newImg','newFB'].forEach(id => document.getElementById(id).value = "");
                showToast("OPERATIVE REGISTERED");
            }
        }

        function showView(view) {
            document.getElementById('memberView').classList.toggle('hidden', view !== 'memberView');
            document.getElementById('adminLoginView').classList.toggle('hidden', view !== 'adminLoginView');
            document.getElementById('navMembers').classList.toggle('active', view === 'memberView');
            document.getElementById('navAdmin').classList.toggle('active', view === 'adminLoginView');
        }

        function handleLogin() {
            if (document.getElementById('loginUser').value === "calvyn" && document.getElementById('loginPass').value === "0808") {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                showView('memberView');
                showToast("ADMIN ACCESS GRANTED");
            } else { showToast("ACCESS DENIED"); }
        }

        document.addEventListener('click', () => { if(player && !isPlaying) player.playVideo(); }, { once: true });
    </script>
</body>
</html>
