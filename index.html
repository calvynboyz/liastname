<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQLUES - Elite Roster Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Kanit:wght@200;400&family=Mitr:wght@300&family=Chakra+Petch:wght@300&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #f3d48b;
            --bg-dark: #121212;
            --admin-box-bg: rgba(26, 13, 13, 0.95);
        }

        body {
            background-color: var(--bg-dark);
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: #fff;
            font-family: 'Rajdhani', 'Kanit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; width: 100%; }

        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 20px 40px; background: rgba(0,0,0,0.7); align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px); }
        #brand-name { font-weight: bold; letter-spacing: 2px; }
        nav button { background: none; border: none; color: #888; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; }
        nav button.active { color: white; border-bottom: 2px solid var(--primary); }

        /* Admin UI */
        #adminLoginView { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background-color: var(--admin-box-bg); width: 100%; max-width: 400px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); text-align: center; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; color: #888; font-size: 0.8rem; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; color: white; outline: none; }

        /* Member Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .member-card { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; position: relative; backdrop-filter: blur(10px); }
        .avatar { width: 65px; height: 65px; border-radius: 8px; background-size: cover; background-position: center; border: 2px solid rgba(243, 212, 139, 0.4); }
        .name { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #eee; margin: 0; }
        .delete-btn { position: absolute; top: 10px; right: 10px; color: #ff4444; cursor: pointer; background: none; border: none; }

        /* Music Player */
        #music-player { position: fixed; bottom: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; border: 2px solid var(--primary); z-index: 1000; }
        .play-btn { background: var(--primary); color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .hidden { display: none !important; }
        .admin-section { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

    <nav>
        <div id="brand-name" style="font-family: 'Orbitron';">CALVYN</div>
        <div style="display: flex; gap: 20px;">
            <button onclick="showView('memberView')" id="navMembers" class="active">MEMBERS</button>
            <button onclick="showView('adminLoginView')" id="navAdmin">ADMIN</button>
        </div>
    </nav>

    <div class="container">
        <section id="adminLoginView" class="hidden">
            <div class="login-card">
                <h2 style="font-family: 'Orbitron'; margin-bottom: 20px;">ADMIN LOGIN</h2>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="loginUser">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass">
                </div>
                <button onclick="handleLogin()" style="width: 100%; background: var(--primary); border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;">LOGIN</button>
            </div>
        </section>

        <section id="memberView">
            <div id="adminPanel" class="hidden" style="background: var(--admin-box-bg); padding: 25px; border-radius: 15px; margin-bottom: 40px; border: 1px solid var(--primary);">
                <h3 style="color: var(--primary); margin-top: 0; font-family: 'Orbitron'; font-size: 0.9rem;">SYSTEM CONTROL PANEL</h3>
                
                <div class="admin-section">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="editBrand" placeholder="Brand Name" style="background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px;">
                        <select id="editFont" style="background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px;">
                            <option value="'Orbitron', sans-serif">Font: Orbitron</option>
                            <option value="'Kanit', sans-serif">Font: Kanit</option>
                            <option value="'Rajdhani', sans-serif">Font: Rajdhani</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="editBG" placeholder="Background Image URL" style="background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px;">
                        <input type="text" id="editMusic" placeholder="Music .mp3 URL" style="background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px;">
                    </div>
                    <button onclick="updateSettings()" style="width: 100%; background: #444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">UPDATE SYSTEM SETTINGS</button>
                </div>

                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="newName" placeholder="Name" style="background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; flex: 1;">
                    <input type="text" id="newImg" placeholder="Avatar URL" style="background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; flex: 1;">
                    <input type="text" id="newFB" placeholder="Facebook URL" style="background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; flex: 1;">
                    <select id="newRole" style="background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px;">
                        <option value="founder">Founder</option>
                        <option value="leader">Leader</option>
                        <option value="member" selected>Member</option>
                    </select>
                    <button onclick="saveToDB()" id="saveBtn" style="background: var(--primary); border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer;">ADD MEMBER</button>
                </div>
                <button onclick="location.reload()" style="margin-top: 20px; color: #ff4444; background: none; border: none; cursor: pointer; font-size: 0.8rem;">[ LOGOUT ]</button>
            </div>

            <div class="grid" id="mainGrid"></div>
        </section>
    </div>

    <div id="music-player">
        <div class="music-info" id="song-name">AUDIO OFF</div>
        <div class="play-btn" onclick="toggleMusic()"><i id="music-icon" class="fas fa-play"></i></div>
        <audio id="bg-audio" loop></audio>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://calvyn-999ea-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false;

        // --- ดึงการตั้งค่าเว็บ (Real-time) ---
        db.ref('settings').on('value', (snapshot) => {
            const s = snapshot.val() || {};
            // เปลี่ยนชื่อและฟอนต์
            const brand = document.getElementById('brand-name');
            brand.innerText = s.brandName || "CALVYN";
            brand.style.fontFamily = s.fontFamily || "'Orbitron'";
            // เปลี่ยนพื้นหลัง
            if(s.bgUrl) document.body.style.backgroundImage = `url('${s.bgUrl}')`;
            else document.body.style.backgroundImage = "url('https://img1.pic.in.th/images/calvyn.png')";
            // เปลี่ยนเพลง
            if(s.musicUrl && document.getElementById('bg-audio').src !== s.musicUrl) {
                document.getElementById('bg-audio').src = s.musicUrl;
            }
        });

        function updateSettings() {
            const brandName = document.getElementById('editBrand').value;
            const fontFamily = document.getElementById('editFont').value;
            const bgUrl = document.getElementById('editBG').value;
            const musicUrl = document.getElementById('editMusic').value;
            
            let data = {};
            if(brandName) data.brandName = brandName;
            if(fontFamily) data.fontFamily = fontFamily;
            if(bgUrl) data.bgUrl = bgUrl;
            if(musicUrl) data.musicUrl = musicUrl;

            db.ref('settings').update(data);
            alert("System Settings Updated!");
        }

        // --- จัดการสมาชิก ---
        db.ref('roster').on('value', (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            if (!data) return;

            Object.keys(data).forEach(id => {
                const item = data[id];
                grid.innerHTML += `
                    <div class="member-card">
                        <div class="avatar" style="background-image: url('${item.img || ''}')"></div>
                        <div class="info">
                            <div style="font-size: 0.65rem; color: var(--primary); font-family: 'Orbitron';">${item.role.toUpperCase()}</div>
                            <div class="name">${item.name}</div>
                            <a href="${item.fb}" target="_blank" style="color: #bbb; text-decoration: none; font-size: 0.75rem;">FACEBOOK</a>
                        </div>
                        ${isAdmin ? `<button class="delete-btn" onclick="deleteItem('${id}')"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>`;
            });
        });

        function saveToDB() {
            const name = document.getElementById('newName').value;
            const img = document.getElementById('newImg').value;
            const fb = document.getElementById('newFB').value;
            const role = document.getElementById('newRole').value;
            if (name) {
                db.ref('roster').push({ name, img, fb, role });
                document.getElementById('newName').value = "";
                document.getElementById('newImg').value = "";
                document.getElementById('newFB').value = "";
            }
        }

        // --- ระบบสลับหน้าและ Login ---
        function showView(view) {
            document.getElementById('memberView').classList.add('hidden');
            document.getElementById('adminLoginView').classList.add('hidden');
            document.getElementById(view).classList.remove('hidden');
            document.getElementById('navMembers').classList.toggle('active', view === 'memberView');
            document.getElementById('navAdmin').classList.toggle('active', view === 'adminLoginView');
        }

        function handleLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if (user === "calvyn" && pass === "0808") {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                showView('memberView');
            } else { alert("ID/Password Incorrect!"); }
        }

        function deleteItem(id) { if (confirm("Remove Operative?")) db.ref('roster/' + id).remove(); }

        // --- ระบบเพลง ---
        const audio = document.getElementById('bg-audio');
        const icon = document.getElementById('music-icon');
        function toggleMusic() {
            if(!audio.src) return alert("Admin hasn't set music yet!");
            if (audio.paused) {
                audio.play();
                icon.className = "fas fa-pause";
                document.getElementById('song-name').innerText = "AUDIO ON";
            } else {
                audio.pause();
                icon.className = "fas fa-play";
                document.getElementById('song-name').innerText = "AUDIO OFF";
            }
        }
    </script>
</body>
</html>
