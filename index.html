<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQLUES - Elite Roster Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Kanit:wght@200;400&family=Mitr:wght@300&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #f3d48b;
            --bg-dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --online-green: #00ff88;
            --danger: #ff0000;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-dark);
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* --- Navbar --- */
        nav { 
            display: flex; justify-content: space-between; padding: 20px 40px; 
            background: rgba(0,0,0,0.8); align-items: center; position: sticky; 
            top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color);
        }
        #brand-name { font-weight: bold; letter-spacing: 3px; font-family: 'Orbitron'; }
        nav button { background: none; border: none; color: #555; cursor: pointer; font-size: 0.8rem; transition: var(--transition); }
        nav button.active { color: #fff; text-shadow: 0 0 10px var(--primary); }

        /* --- UI รายชื่อแบบใหม่ (ถอดจากภาพ) --- */
        .section-title { 
            font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 5px; color: #333; 
            margin: 50px 0 25px; display: flex; align-items: center; gap: 20px;
        }
        .section-title::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, #222, transparent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        .member-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 20px; display: flex; align-items: center; gap: 20px;
            position: relative; backdrop-filter: blur(10px); transition: var(--transition);
            opacity: 0; transform: translateY(10px);
        }
        .member-card.show { opacity: 1; transform: translateY(0); }
        .member-card:hover { border-color: rgba(255,255,255,0.2); background: rgba(25, 25, 25, 0.9); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .avatar-wrap { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
        .avatar-box { 
            width: 100%; height: 100%; background-size: cover; background-position: center; 
            border-radius: 4px; border: 1px solid var(--border-color);
        }
        .status-pulse {
            position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px;
            background: var(--online-green); border: 3px solid #0f0f0f; border-radius: 50%;
            box-shadow: 0 0 8px var(--online-green);
        }

        .info { flex-grow: 1; }
        .role-tag { font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .role-founder { color: var(--primary); }
        .role-leader { color: #e74c3c; }
        .role-member { color: #888; }

        .name { font-family: 'Orbitron'; font-size: 1.1rem; margin: 0; color: #eee; }
        .fb-link { font-size: 0.75rem; color: #444; text-decoration: none; margin-top: 5px; display: inline-block; transition: 0.3s; }
        .fb-link:hover { color: #fff; }

        .delete-btn { position: absolute; top: 10px; right: 10px; color: var(--danger); cursor: pointer; background: none; border: none; opacity: 0.3; transition: 0.3s; }
        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        /* --- Admin Dashboard --- */
        #adminPanel { background: #111; border: 1px solid var(--primary); padding: 30px; margin-bottom: 40px; border-radius: 20px; display: none; }
        .admin-form input, .admin-form select { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; outline: none; transition: 0.3s; }
        .admin-form input:focus { border-color: var(--primary); }

        /* --- Music Player UI (Starboy Style) --- */
        .bottom-ui { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .music-mini-player { 
            display: flex; align-items: center; background: rgba(20, 20, 20, 0.95); 
            border: 1px solid var(--border-color); padding: 8px; width: 250px; 
            cursor: pointer; backdrop-filter: blur(10px); border-radius: 8px; transition: var(--transition);
        }
        .full-player { 
            position: fixed; bottom: 30px; right: 30px; width: 320px; 
            background: rgba(10, 10, 10, 0.98); border: 1px solid var(--border-color);
            padding: 25px; display: none; flex-direction: column; border-radius: 20px;
            backdrop-filter: blur(25px); box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .hidden { display: none !important; }
        .toast { position: fixed; top: 100px; right: 20px; background: var(--primary); color: #000; padding: 15px 30px; border-radius: 10px; font-weight: bold; transform: translateX(150%); transition: 0.5s; z-index: 9999; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <nav>
        <div id="brand-name">CALVYN</div>
        <div style="display: flex; gap: 20px;">
            <button onclick="showView('memberView')" id="navMembers" class="active">MEMBERS</button>
            <button onclick="showView('adminLoginView')" id="navAdmin">ADMIN</button>
        </div>
    </nav>

    <div id="toast-container"></div>

    <div class="container">
        <section id="adminLoginView" class="hidden" style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
            <div style="background: rgba(26, 13, 13, 0.95); padding: 40px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center;">
                <h2 style="font-family: 'Orbitron'; color: var(--primary); margin-bottom: 30px;">SECURE ACCESS</h2>
                <input type="text" id="loginUser" placeholder="Username" style="width:100%; background:#000; border:1px solid #333; padding:15px; margin-bottom:15px; color:#fff; border-radius:10px;">
                <input type="password" id="loginPass" placeholder="Access Key" style="width:100%; background:#000; border:1px solid #333; padding:15px; margin-bottom:25px; color:#fff; border-radius:10px;">
                <button onclick="handleLogin()" style="width:100%; background:var(--primary); padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">INITIALIZE</button>
            </div>
        </section>

        <section id="memberView">
            <div id="adminPanel">
                <h3 style="color: var(--primary); font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 20px;">SYSTEM CONTROL</h3>
                <div style="border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="editBrand" placeholder="Brand Name">
                        <select id="editFont">
                            <option value="'Orbitron'">Font: Orbitron</option>
                            <option value="'Kanit'">Font: Kanit</option>
                        </select>
                        <input type="text" id="editBG" placeholder="BG URL">
                        <input type="text" id="editMusic" placeholder="YouTube ID">
                    </div>
                    <button onclick="updateSettings()" style="width: 100%; background: #222; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 5px; cursor: pointer;">SYNC SYSTEM</button>
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="newName" placeholder="Name" style="flex: 1;">
                    <input type="text" id="newImg" placeholder="Avatar URL" style="flex: 1;">
                    <input type="text" id="newFB" placeholder="FB URL" style="flex: 1;">
                    <select id="newRole">
                        <option value="founder">Founder</option>
                        <option value="leader">Leader</option>
                        <option value="member" selected>Member</option>
                    </select>
                    <button onclick="saveToDB()" style="background: var(--primary); border: none; padding: 0 30px; border-radius: 5px; font-weight: bold; cursor: pointer;">ADD</button>
                </div>
            </div>

            <div class="section-title">01_FOUNDERS</div>
            <div class="grid" id="founderGrid"></div>

            <div class="section-title">02_COMMANDERS</div>
            <div class="grid" id="leaderGrid"></div>

            <div class="section-title">03_OPERATIVES</div>
            <div class="grid" id="memberGrid"></div>
        </section>
    </div>

    <div class="bottom-ui">
        <div class="music-mini-player" id="miniPlayer" onclick="togglePlayer()">
            <img src="" class="mini-art" id="miniArt">
            <div class="mini-info">
                <span class="mini-title" id="displayTitle">STARBOY</span>
                <span class="mini-artist">THE WEEKND</span>
            </div>
            <i class="fa-solid fa-caret-up" style="color:#555; font-size: 0.7rem;"></i>
        </div>

        <div class="full-player" id="fullPlayer">
            <div style="display:flex; justify-content:space-between; font-size:0.6rem; color:#444; margin-bottom:15px; font-family:'Orbitron';">
                <span onclick="togglePlayer()" style="cursor:pointer;">HIDE</span>
                <span style="color:var(--danger);">NOW PLAYING</span>
            </div>
            <img src="" id="fullArt" style="width:100%; border-radius:10px; margin-bottom:20px;">
            <div style="text-align:center; margin-bottom:20px;">
                <h2 id="fullTitle" style="font-family:'Orbitron'; font-size:0.9rem; margin:0;">STARBOY</h2>
                <p style="font-size:0.6rem; color:#666; margin:5px 0 0 0;">THE WEEKND FT. DAFT PUNK</p>
            </div>
            <div style="width:100%; height:2px; background:#1a1a1a; margin-bottom:20px; cursor:pointer;" onclick="seek(event)">
                <div id="progressLine" style="height:100%; background:var(--danger); width:0%;"></div>
            </div>
            <div style="display:flex; justify-content:center; margin-bottom:20px;">
                <button onclick="togglePlay()" style="background:#fff; color:#000; width:50px; height:50px; border-radius:50%; border:none; cursor:pointer;"><i class="fa-solid fa-play" id="playIcon"></i></button>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fa-solid fa-volume-low" style="color:#333; font-size:0.7rem;"></i>
                <input type="range" min="0" max="100" value="20" oninput="changeVolume(this.value)" style="flex:1; accent-color:#555;">
            </div>
        </div>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://calvyn-999ea-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false, player, isPlaying = false;

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.classList.add('show'), 50);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        // YouTube API
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);

        function onYouTubeIframeAPIReady() {
            db.ref('settings/musicUrl').once('value', s => {
                const vidId = s.val() || 'XXYlFuWEuKI';
                player = new YT.Player('yt-player', {
                    videoId: vidId, playerVars: { 'autoplay': 1, 'playlist': vidId },
                    events: {
                        'onReady': (e) => { e.target.setVolume(20); updateProgress(); },
                        'onStateChange': (e) => {
                            isPlaying = (e.data == YT.PlayerState.PLAYING);
                            document.getElementById('playIcon').className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
                        }
                    }
                });
            });
        }

        function togglePlayer() {
            const full = document.getElementById('fullPlayer');
            full.style.display = full.style.display === "flex" ? "none" : "flex";
        }

        function togglePlay() { isPlaying ? player.pauseVideo() : player.playVideo(); }
        function changeVolume(v) { if(player) player.setVolume(v); }
        function seek(e) { player.seekTo(player.getDuration() * (e.offsetX / e.currentTarget.offsetWidth)); }
        function updateProgress() {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const perc = (player.getCurrentTime() / player.getDuration()) * 100;
                    document.getElementById('progressLine').style.width = perc + "%";
                }
            }, 1000);
        }

        // Database Sync
        db.ref('settings').on('value', (snapshot) => {
            const s = snapshot.val() || {};
            document.getElementById('brand-name').innerText = s.brandName || "CALVYN";
            document.getElementById('brand-name').style.fontFamily = s.fontFamily || "'Orbitron'";
            document.body.style.backgroundImage = s.bgUrl ? `url('${s.bgUrl}')` : "url('https://img1.pic.in.th/images/calvyn.png')";
            
            if(s.musicUrl && player && player.loadVideoById) {
                if(player.getVideoData().video_id !== s.musicUrl) {
                    player.loadVideoById(s.musicUrl);
                    const img = `https://i.ytimg.com/vi/${s.musicUrl}/maxresdefault.jpg`;
                    document.getElementById('miniArt').src = img;
                    document.getElementById('fullArt').src = img;
                }
            }
        });

        db.ref('roster').on('value', (snapshot) => {
            const grids = { founder: document.getElementById('founderGrid'), leader: document.getElementById('leaderGrid'), member: document.getElementById('memberGrid') };
            Object.values(grids).forEach(g => g.innerHTML = "");
            const data = snapshot.val();
            if (!data) return;

            Object.keys(data).forEach((id, index) => {
                const item = data[id];
                const card = `
                    <div class="member-card" id="card-${id}">
                        <div class="avatar-wrap">
                            <div class="avatar-box" style="background-image: url('${item.img || ''}')"></div>
                            <div class="status-pulse"></div>
                        </div>
                        <div class="info">
                            <span class="role-tag role-${item.role}">${item.role.toUpperCase()}</span>
                            <h4 class="name">${item.name}</h4>
                            <a href="${item.fb}" target="_blank" class="fb-link">FACEBOOK</a>
                        </div>
                        ${isAdmin ? `<button class="delete-btn" onclick="deleteItem('${id}')"><i class="fas fa-trash"></i></button>` : ''}
                    </div>`;
                if(grids[item.role]) {
                    grids[item.role].innerHTML += card;
                    setTimeout(() => document.getElementById(`card-${id}`).classList.add('show'), index * 100);
                }
            });
        });

        function updateSettings() {
            db.ref('settings').update({
                brandName: document.getElementById('editBrand').value || "CALVYN",
                fontFamily: document.getElementById('editFont').value,
                bgUrl: document.getElementById('editBG').value,
                musicUrl: document.getElementById('editMusic').value
            });
            showToast("SYSTEM RE-INITIALIZED");
        }

        function saveToDB() {
            const name = document.getElementById('newName').value;
            if (name) {
                db.ref('roster').push({
                    name, img: document.getElementById('newImg').value,
                    fb: document.getElementById('newFB').value,
                    role: document.getElementById('newRole').value
                });
                ['newName','newImg','newFB'].forEach(id => document.getElementById(id).value = "");
                showToast("OPERATIVE REGISTERED");
            }
        }

        function showView(view) {
            document.getElementById('memberView').classList.toggle('hidden', view !== 'memberView');
            document.getElementById('adminLoginView').classList.toggle('hidden', view !== 'adminLoginView');
            document.getElementById('navMembers').classList.toggle('active', view === 'memberView');
            document.getElementById('navAdmin').classList.toggle('active', view === 'adminLoginView');
        }

        function handleLogin() {
            if (document.getElementById('loginUser').value === "calvyn" && document.getElementById('loginPass').value === "0808") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                showView('memberView');
                showToast("ADMIN ACCESS GRANTED");
            } else { showToast("ACCESS DENIED"); }
        }

        function deleteItem(id) { if (confirm("TERMINATE?")) db.ref('roster/' + id).remove(); }
        document.addEventListener('click', () => { if(player && !isPlaying) player.playVideo(); }, { once: true });
    </script>
</body>
</html>
