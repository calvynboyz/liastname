<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQLUES - Elite Roster Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Kanit:wght@200;400;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #f3d48b;
            --bg-dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --online-green: #00ff88;
            --danger: #ff0000;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: url('https://img1.pic.in.th/images/calvyn.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0; min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* --- Brand Name & Headers (หนาและชัด) --- */
        #brand-name { font-weight: 900; letter-spacing: 5px; font-family: 'Orbitron'; font-size: 1.8rem; text-shadow: 0 0 20px rgba(243, 212, 139, 0.5); }
        .section-title { font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 900; letter-spacing: 10px; color: #fff; margin: 70px 0 30px; display: flex; align-items: center; gap: 20px; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .section-title::after { content: ""; height: 3px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        /* --- Navbar --- */
        nav { display: flex; justify-content: space-between; padding: 15px 40px; background: rgba(0,0,0,0.85); align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); }
        nav button { background: none; border: none; color: #555; cursor: pointer; font-size: 0.8rem; transition: var(--transition); font-family: 'Orbitron'; font-weight: 700; }
        nav button.active { color: #fff; text-shadow: 0 0 15px var(--primary); }

        /* --- Login Box (โทนขาวพรีเมียม) --- */
        #adminLoginView .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px; border-radius: 30px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); color: #111;
            animation: fadeInSlide 0.6s ease;
        }
        #adminLoginView h2 { font-family: 'Orbitron'; font-weight: 900; color: #111; margin-bottom: 30px; letter-spacing: 3px; }
        #adminLoginView input { width: 100%; background: #f0f0f0; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; color: #000; border-radius: 12px; outline: none; font-weight: 700; }
        #adminLoginView button { width: 100%; background: #111; color: #fff; padding: 18px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        #adminLoginView button:hover { background: var(--danger); transform: scale(1.02); }

        /* --- Admin Wrapper --- */
        #adminWrapper { background: rgba(20, 10, 10, 0.95); border: 1px solid var(--primary); border-radius: 20px; margin-bottom: 40px; overflow: hidden; transition: var(--transition); max-height: 2000px; backdrop-filter: blur(20px); }
        #adminWrapper.collapsed { max-height: 55px; border-color: #222; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; cursor: pointer; background: rgba(243, 212, 139, 0.05); }
        .admin-content { padding: 30px; }
        .admin-sub-title { font-family: 'Orbitron'; font-size: 0.75rem; color: var(--primary); margin-bottom: 20px; display: block; border-left: 4px solid var(--primary); padding-left: 10px; font-weight: 900; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }

        /* --- Member Card --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; display: flex; align-items: center; gap: 20px; border-radius: 8px; position: relative; backdrop-filter: blur(10px); transition: var(--transition); opacity: 0; transform: translateY(20px); cursor: pointer; }
        .member-card.show { opacity: 1; transform: translateY(0); }
        .member-card:hover { border-color: var(--primary); background: rgba(30, 30, 30, 0.9); transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .avatar-box { width: 80px; height: 80px; background-size: cover; background-position: center; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .name { font-family: 'Orbitron'; font-size: 1.2rem; margin: 0; color: #fff; font-weight: 900; }

        /* --- Player UI --- */
        .bottom-ui { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .music-mini-player { display: flex; align-items: center; background: rgba(15, 15, 15, 0.95); border: 1px solid var(--border-color); padding: 8px; width: 260px; cursor: pointer; border-radius: 12px; transition: var(--transition); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .full-player { position: fixed; bottom: 30px; right: 30px; width: 320px; background: rgba(5, 5, 5, 0.98); border: 1px solid var(--border-color); padding: 25px; display: none; flex-direction: column; border-radius: 24px; animation: slideIn 0.5s ease; }

        .hidden { display: none !important; }
        .toast { position: fixed; top: 100px; right: 20px; background: #fff; color: #000; padding: 15px 35px; border-radius: 12px; font-weight: 900; transform: translateX(150%); transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 9999; font-family: 'Orbitron'; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <nav>
        <div id="brand-name">CALVYN</div>
        <div style="display: flex; gap: 25px;">
            <button onclick="showView('memberView')" id="navMembers" class="active">MEMBERS</button>
            <button onclick="showView('adminLoginView')" id="navAdmin">ADMIN</button>
        </div>
    </nav>

    <div id="toast-container"></div>

    <div class="container">
        <section id="adminLoginView" class="hidden" style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
            <div class="login-card">
                <h2>ADMIN LOGIN</h2>
                <input type="text" id="loginUser" placeholder="USERNAME">
                <input type="password" id="loginPass" placeholder="PASSCODE">
                <button onclick="handleLogin()">LOGIN SYSTEM</button>
            </div>
        </section>

        <section id="memberView">
            <div class="search-container" style="display: flex; justify-content: flex-end; margin-bottom: 30px;">
                <div style="position: relative; width: 300px;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary);"></i>
                    <input type="text" id="memberSearch" placeholder="SEARCH OPERATIVES..." onkeyup="filterMembers()" style="width:100%; background:rgba(255,255,255,0.03); border:none; border-bottom:2px solid var(--primary); padding:12px; color:#fff; font-family:'Rajdhani'; outline:none; font-weight:700;">
                </div>
            </div>

            <div id="adminPanel" class="hidden">
                <div id="adminWrapper">
                    <div class="admin-header" onclick="toggleAdminPanel()">
                        <span style="color: var(--primary); font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px; font-weight: 900;">
                            <i class="fas fa-shield-alt mr-2"></i> SYSTEM DASHBOARD
                        </span>
                        <span id="collapseIcon" style="color: #444; font-family: 'Orbitron'; font-size: 0.7rem;">[ - ] HIDE PANEL</span>
                    </div>
                    <div class="admin-content admin-form">
                        <span class="admin-sub-title">SYSTEM CONFIG</span>
                        <div class="admin-grid">
                            <input type="text" id="editBrand" placeholder="Web Title">
                            <select id="editFont">
                                <option value="'Orbitron'">Font: Orbitron</option>
                                <option value="'Kanit'">Font: Kanit</option>
                                <option value="'Rajdhani'">Font: Rajdhani</option>
                            </select>
                            <input type="text" id="editBG" placeholder="Background URL">
                        </div>
                        <span class="admin-sub-title">MUSIC MANAGER</span>
                        <div class="admin-grid">
                            <input type="text" id="editMusicTitle" placeholder="Song Title">
                            <input type="text" id="editMusicArtist" placeholder="Artist Name">
                            <input type="text" id="editMusicImg" placeholder="Music Cover URL">
                            <input type="text" id="editMusicId" placeholder="YouTube Video ID">
                        </div>
                        <button class="btn-action" onclick="updateSettings()" style="width:100%; margin-bottom: 35px; background: #222; color: #fff;">UPDATE CORE SYSTEM</button>
                        <span class="admin-sub-title">OPERATIVE MANAGER</span>
                        <div class="admin-grid">
                            <input type="hidden" id="editMemberId">
                            <input type="text" id="newName" placeholder="Name">
                            <input type="text" id="newImg" placeholder="Profile Link">
                            <input type="text" id="newFB" placeholder="Facebook Link">
                            <select id="newRole">
                                <option value="founder">Founder</option>
                                <option value="leader">Leader</option>
                                <option value="member" selected>Member</option>
                            </select>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="saveToDB()" id="addBtn" class="btn-action" style="flex:1;">ADD OPERATIVE</button>
                            <button onclick="resetMemberForm()" id="cancelEditBtn" class="hidden" style="background: #333; color: #fff; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-family:'Orbitron'; font-size:0.7rem;">CANCEL</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="rosterSections">
                <div id="founderSection">
                    <div class="section-title">FOUNDERS</div>
                    <div class="grid" id="founderGrid"></div>
                </div>
                <div id="leaderSection">
                    <div class="section-title">LEADERS</div>
                    <div class="grid" id="leaderGrid"></div>
                </div>
                <div id="memberSection">
                    <div class="section-title">MEMBER CALVYN</div>
                    <div class="grid" id="memberGrid"></div>
                </div>
            </div>
        </section>
    </div>

    <div class="bottom-ui">
        <div class="music-mini-player" id="miniPlayer" onclick="togglePlayer()">
            <img src="" class="mini-art" id="miniArt" style="width:45px; height:45px; border-radius:5px; object-fit:cover;">
            <div style="flex:1; padding-left:15px; overflow:hidden;">
                <span id="displayMiniTitle" style="font-family:'Orbitron'; font-size:0.6rem; color:#fff; display:block; font-weight:900;">STARBOY</span>
                <span id="displayMiniArtist" style="font-size:0.5rem; color:#666; font-weight: 700;">THE WEEKND</span>
            </div>
            <i class="fa-solid fa-chevron-up" style="color:#444; font-size: 0.7rem; margin: 0 10px;"></i>
        </div>

        <div class="full-player" id="fullPlayer">
            <div style="display:flex; justify-content:space-between; font-size:0.6rem; color:#444; margin-bottom:20px; font-family:'Orbitron'; font-weight: 900;">
                <span onclick="togglePlayer()" style="cursor:pointer;">HIDE</span>
                <span style="color:var(--danger);">LIVE SYNC</span>
            </div>
            <img src="" id="fullArt" style="width:100%; border-radius:15px; margin-bottom:25px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);">
            <div style="text-align:center; margin-bottom:25px;">
                <h2 id="fullTitle" style="font-family:'Orbitron'; font-size:1.1rem; margin:0; font-weight:900;">STARBOY</h2>
                <p id="fullArtist" style="font-size:0.65rem; color:#666; margin:8px 0 0 0; letter-spacing:3px; font-weight: 700;">THE WEEKND</p>
            </div>
            <div style="width:100%; height:4px; background:#1a1a1a; margin-bottom:25px; cursor:pointer; border-radius:10px;" onclick="seek(event)">
                <div id="progressLine" style="height:100%; background:var(--danger); width:0%;"></div>
            </div>
            <div style="display:flex; justify-content:center; margin-bottom:25px;">
                <button onclick="togglePlay()" style="background:#fff; color:#000; width:60px; height:60px; border-radius:50%; border:none; cursor:pointer;"><i class="fa-solid fa-play" id="playIcon"></i></button>
            </div>
            <input type="range" min="0" max="100" value="20" oninput="changeVolume(this.value)" style="width:100%; accent-color:var(--primary);">
        </div>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://calvyn-999ea-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false, player, isPlaying = false;

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.classList.add('show'), 50);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 600); }, 3000);
        }

        function toggleAdminPanel() {
            const wrapper = document.getElementById('adminWrapper');
            wrapper.classList.toggle('collapsed');
            document.getElementById('collapseIcon').innerText = wrapper.classList.contains('collapsed') ? "[ + ] SHOW PANEL" : "[ - ] HIDE PANEL";
        }

        function filterMembers() {
            const val = document.getElementById('memberSearch').value.toLowerCase();
            document.querySelectorAll('.member-card').forEach(card => {
                const name = card.querySelector('.name').innerText.toLowerCase();
                card.style.display = name.includes(val) ? 'flex' : 'none';
            });
        }

        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);

        function onYouTubeIframeAPIReady() {
            db.ref('settings').once('value', s => {
                const vidId = s.val()?.musicUrl || 'XXYlFuWEuKI';
                player = new YT.Player('yt-player', {
                    videoId: vidId, playerVars: { 'autoplay': 1, 'playlist': vidId },
                    events: {
                        'onReady': (e) => { e.target.setVolume(20); setInterval(updateProgress, 500); },
                        'onStateChange': (e) => {
                            isPlaying = (e.data == YT.PlayerState.PLAYING);
                            document.getElementById('playIcon').className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
                        }
                    }
                });
            });
        }

        function togglePlayer() { const f = document.getElementById('fullPlayer'); f.style.display = f.style.display === "flex" ? "none" : "flex"; }
        function togglePlay() { isPlaying ? player.pauseVideo() : player.playVideo(); }
        function changeVolume(v) { if(player) player.setVolume(v); }
        function seek(e) { player.seekTo(player.getDuration() * (e.offsetX / e.currentTarget.offsetWidth)); }
        function updateProgress() { if (player && player.getCurrentTime) document.getElementById('progressLine').style.width = (player.getCurrentTime() / player.getDuration()) * 100 + "%"; }

        db.ref('settings').on('value', (snapshot) => {
            const s = snapshot.val() || {};
            const b = document.getElementById('brand-name');
            b.innerText = s.brandName || "CALVYN";
            b.style.fontFamily = s.fontFamily || "'Orbitron'";
            document.body.style.backgroundImage = s.bgUrl ? `url('${s.bgUrl}')` : "url('https://img1.pic.in.th/images/calvyn.png')";
            
            const mTitle = s.musicTitle || "STARBOY", mArtist = s.musicArtist || "THE WEEKND", mImg = s.musicImg || `https://i.ytimg.com/vi/${s.musicUrl}/maxresdefault.jpg`;
            document.getElementById('displayMiniTitle').innerText = mTitle;
            document.getElementById('displayMiniArtist').innerText = mArtist;
            document.getElementById('miniArt').src = mImg; document.getElementById('fullArt').src = mImg;
            document.getElementById('fullTitle').innerText = mTitle; document.getElementById('fullArtist').innerText = mArtist;

            if(s.musicUrl && player && player.loadVideoById && player.getVideoData().video_id !== s.musicUrl) player.loadVideoById(s.musicUrl);
        });

        db.ref('roster').on('value', (snapshot) => {
            const grids = { founder: document.getElementById('founderGrid'), leader: document.getElementById('leaderGrid'), member: document.getElementById('memberGrid') };
            Object.values(grids).forEach(g => g.innerHTML = "");
            const data = snapshot.val(); if (!data) return;
            Object.keys(data).forEach((id, index) => {
                const item = data[id];
                const card = document.createElement('div');
                card.className = 'member-card'; card.onclick = () => { if(isAdmin) prepareEditMember(id, item); };
                card.innerHTML = `
                    <div class="avatar-box" style="background-image: url('${item.img || ''}')"></div>
                    <div class="status-pulse"></div>
                    <div class="info">
                        <span class="role-tag role-${item.role}">${item.role.toUpperCase()}</span>
                        <h4 class="name">${item.name}</h4>
                        <a href="${item.fb}" target="_blank" class="fb-link">VIEW FACEBOOK</a>
                    </div>
                    ${isAdmin ? `<button class="delete-btn" onclick="event.stopPropagation(); deleteItem('${id}')"><i class="fas fa-trash-alt"></i></button>` : ''}
                `;
                if(grids[item.role]) { grids[item.role].appendChild(card); setTimeout(() => card.classList.add('show'), index * 80); }
            });
        });

        function updateSettings() {
            db.ref('settings').update({
                brandName: document.getElementById('editBrand').value || "CALVYN",
                fontFamily: document.getElementById('editFont').value,
                bgUrl: document.getElementById('editBG').value,
                musicUrl: document.getElementById('editMusicId').value || "XXYlFuWEuKI",
                musicTitle: document.getElementById('editMusicTitle').value || "STARBOY",
                musicArtist: document.getElementById('editMusicArtist').value || "THE WEEKND",
                musicImg: document.getElementById('editMusicImg').value
            });
            showToast("CORE SYSTEM SYNCED");
        }

        function prepareEditMember(id, data) {
            document.getElementById('editMemberId').value = id;
            document.getElementById('newName').value = data.name;
            document.getElementById('newImg').value = data.img;
            document.getElementById('newFB').value = data.fb;
            document.getElementById('newRole').value = data.role;
            document.getElementById('addBtn').innerText = "UPDATE OPERATIVE";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetMemberForm() {
            document.getElementById('editMemberId').value = "";
            ['newName','newImg','newFB'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('addBtn').innerText = "ADD OPERATIVE";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function saveToDB() {
            const id = document.getElementById('editMemberId').value, name = document.getElementById('newName').value;
            const data = { name, img: document.getElementById('newImg').value, fb: document.getElementById('newFB').value, role: document.getElementById('newRole').value };
            if (name) {
                if(id) db.ref('roster/' + id).update(data); else db.ref('roster').push(data);
                showToast(id ? "OPERATIVE UPDATED" : "OPERATIVE REGISTERED"); resetMemberForm();
            }
        }

        function showView(view) {
            document.getElementById('memberView').classList.toggle('hidden', view !== 'memberView');
            document.getElementById('adminLoginView').classList.toggle('hidden', view !== 'adminLoginView');
            document.getElementById('navMembers').classList.toggle('active', view === 'memberView');
            document.getElementById('navAdmin').classList.toggle('active', view === 'adminLoginView');
        }

        function handleLogin() {
            if (document.getElementById('loginUser').value === "calvyn" && document.getElementById('loginPass').value === "0808") {
                isAdmin = true; document.getElementById('adminPanel').classList.remove('hidden'); showView('memberView'); showToast("ACCESS GRANTED");
            } else showToast("INVALID PASSKEY");
        }

        function deleteItem(id) { if (confirm("TERMINATE OPERATIVE?")) db.ref('roster/' + id).remove(); }
        document.addEventListener('click', () => { if(player && !isPlaying) player.playVideo(); }, { once: true });
    </script>
</body>
</html>
