<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQLUES - Elite Roster Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Kanit:wght@200;400&family=Mitr:wght@300&family=Chakra+Petch:wght@300&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #f3d48b;
            --bg-dark: #121212;
            --admin-box-bg: rgba(26, 13, 13, 0.95);
            --danger: #ff0000;
            --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: #fff;
            font-family: 'Rajdhani', 'Kanit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 1s ease;
            overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; width: 100%; }

        /* --- Navbar Smooth --- */
        nav { 
            display: flex; justify-content: space-between; padding: 20px 40px; 
            background: rgba(0,0,0,0.7); align-items: center; position: sticky; 
            top: 0; z-index: 100; backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        #brand-name { font-weight: bold; letter-spacing: 2px; transition: var(--transition-smooth); }
        nav button { 
            background: none; border: none; color: #666; cursor: pointer; 
            font-family: 'Orbitron'; font-size: 0.8rem; transition: var(--transition-smooth);
            position: relative; padding: 10px 0;
        }
        nav button::after {
            content: ""; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px;
            background: var(--primary); transition: var(--transition-smooth); transform: translateX(-50%);
        }
        nav button.active { color: #fff; text-shadow: 0 0 10px rgba(243, 212, 139, 0.5); }
        nav button.active::after { width: 100%; }

        /* --- View Animations --- */
        section { opacity: 0; transform: translateY(20px); transition: var(--transition-smooth); display: none; }
        section.active-view { display: block; opacity: 1; transform: translateY(0); }

        /* --- Admin Dashboard UI --- */
        .login-card { 
            background-color: var(--admin-box-bg); width: 100%; max-width: 400px; 
            padding: 40px; border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .input-group input, .input-group select { 
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; 
            border-radius: 12px; padding: 12px; color: white; outline: none; 
            transition: var(--transition-smooth); box-sizing: border-box;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(243, 212, 139, 0.2); }

        /* --- Member Card Smooth Load --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .member-card { 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08); 
            padding: 20px; border-radius: 16px; display: flex; align-items: center; 
            gap: 18px; position: relative; backdrop-filter: blur(12px);
            transition: var(--transition-smooth);
            animation: cardEnter 0.6s ease forwards;
            opacity: 0;
        }
        @keyframes cardEnter { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .member-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 20px rgba(243, 212, 139, 0.1);
        }
        .avatar { 
            width: 65px; height: 65px; border-radius: 12px; 
            background-size: cover; background-position: center; 
            border: 2px solid rgba(243, 212, 139, 0.3); transition: var(--transition-smooth); 
        }
        .member-card:hover .avatar { transform: rotate(3deg) scale(1.1); border-color: var(--primary); }

        /* --- Custom UI Smooth --- */
        .toast { 
            background: var(--primary); color: #000; padding: 15px 30px; border-radius: 12px; 
            margin-bottom: 12px; font-weight: bold; font-family: 'Orbitron'; font-size: 0.8rem; 
            transform: translateX(150%); transition: 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
        }
        .toast.show { transform: translateX(0); }
        
        #modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            z-index: 10000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal { 
            background: #1a0d0d; border: 1px solid var(--primary); padding: 40px; 
            border-radius: 24px; max-width: 400px; width: 90%; text-align: center;
            transform: scale(0.7); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- Music Player UI --- */
        .bottom-ui { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .music-mini-player { 
            display: flex; align-items: center; background: rgba(20, 20, 20, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px; width: 260px; 
            cursor: pointer; backdrop-filter: blur(15px); transition: var(--transition-smooth);
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .music-mini-player:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        .full-player { 
            position: fixed; bottom: 30px; right: 30px; width: 330px; 
            background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px; display: none; flex-direction: column; 
            z-index: 1100; backdrop-filter: blur(30px); border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            animation: playerPop 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes playerPop { from { opacity: 0; transform: scale(0.8) translateY(50px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .play-btn-circle { 
            background: #fff; color: #000; width: 55px; height: 55px; border: none; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.3rem; cursor: pointer; transition: 0.3s ease;
        }
        .play-btn-circle:hover { background: var(--primary); transform: scale(1.15); box-shadow: 0 0 20px rgba(243, 212, 139, 0.4); }

        .delete-btn { position: absolute; top: 12px; right: 12px; color: var(--danger); cursor: pointer; background: none; border: none; opacity: 0.4; transition: 0.3s; }
        .delete-btn:hover { opacity: 1; transform: rotate(90deg) scale(1.2); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div id="brand-name" style="font-family: 'Orbitron';">CALVYN</div>
        <div style="display: flex; gap: 25px;">
            <button onclick="showView('memberView')" id="navMembers" class="active">MEMBERS</button>
            <button onclick="showView('adminLoginView')" id="navAdmin">ADMIN</button>
        </div>
    </nav>

    <div id="toast-container" style="position: fixed; top: 100px; right: 20px; z-index: 9999;"></div>

    <div id="modal-overlay">
        <div class="modal" id="confirmModal">
            <h3 style="font-family:'Orbitron'; letter-spacing: 2px;">TERMINATE?</h3>
            <p id="modal-text" style="color: #888; font-size: 0.9rem; margin-bottom: 30px;"></p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button onclick="closeModal()" style="padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer; background:#333; color:white; font-family:'Orbitron'; font-size:0.7rem;">CANCEL</button>
                <button id="confirm-delete-btn" style="padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer; background:var(--danger); color:white; font-family:'Orbitron'; font-size:0.7rem; font-weight:bold; box-shadow: 0 0 15px rgba(255,0,0,0.3);">CONFIRM</button>
            </div>
        </div>
    </div>

    <div class="container">
        <section id="adminLoginView" style="min-height: 70vh; flex-direction: column; align-items: center; justify-content: center;">
            <div class="login-card">
                <h1 style="font-family: 'Orbitron'; margin-bottom: 40px; color: var(--primary); letter-spacing: 5px;">ADMIN</h1>
                <div class="input-group" style="text-align: left; margin-bottom: 20px;">
                    <label style="color:#666; font-size:0.75rem; text-transform: uppercase; margin-left: 5px;">User Access</label>
                    <input type="text" id="loginUser" placeholder="Username">
                </div>
                <div class="input-group" style="text-align: left; margin-bottom: 30px;">
                    <label style="color:#666; font-size:0.75rem; text-transform: uppercase; margin-left: 5px;">Secure Key</label>
                    <input type="password" id="loginPass" placeholder="Password">
                </div>
                <button onclick="handleLogin()" style="width: 100%; background: var(--primary); border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; transition: 0.4s;">INITIALIZE</button>
            </div>
        </section>

        <section id="memberView" class="active-view">
            <div id="adminPanel" class="hidden" style="background: var(--admin-box-bg); padding: 30px; border-radius: 20px; margin-bottom: 40px; border: 1px solid var(--primary);">
                <h3 style="color: var(--primary); margin: 0 0 25px 0; font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px;">DASHBOARD CONTROL</h3>
                
                <div style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 25px; margin-bottom: 25px;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px;">
                        <input type="text" id="editBrand" placeholder="Brand Name">
                        <select id="editFont">
                            <option value="'Orbitron', sans-serif">Font: Orbitron</option>
                            <option value="'Kanit', sans-serif">Font: Kanit</option>
                            <option value="'Rajdhani', sans-serif">Font: Rajdhani</option>
                        </select>
                        <input type="text" id="editBG" placeholder="BG Image URL">
                        <input type="text" id="editMusic" placeholder="YouTube ID (STARBOY: XXYlFuWEuKI)">
                    </div>
                    <button onclick="updateSettings()" style="width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 14px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; transition: 0.3s;">SYNC SYSTEM SETTINGS</button>
                </div>

                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <input type="text" id="newName" placeholder="Member Name" style="flex: 1; min-width: 180px;">
                    <input type="text" id="newImg" placeholder="Avatar URL" style="flex: 1; min-width: 180px;">
                    <input type="text" id="newFB" placeholder="Facebook URL" style="flex: 1; min-width: 180px;">
                    <select id="newRole" style="flex: 0.5; min-width: 120px;">
                        <option value="founder">Founder</option>
                        <option value="leader">Leader</option>
                        <option value="member" selected>Member</option>
                    </select>
                    <button onclick="saveToDB()" style="background: var(--primary); border: none; padding: 0 30px; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem;">ADD</button>
                </div>
            </div>

            <div class="grid" id="mainGrid"></div>
        </section>
    </div>

    <div class="bottom-ui">
        <div class="music-mini-player" id="miniPlayer" onclick="togglePlayer()">
            <img src="https://i.ytimg.com/vi/XXYlFuWEuKI/maxresdefault.jpg" class="mini-art" id="miniArt">
            <div class="mini-info">
                <span class="mini-title" id="displayTitle">STARBOY</span>
                <span class="mini-artist" id="displayArtist">THE WEEKND</span>
            </div>
            <i class="fa-solid fa-chevron-up" style="font-size: 0.6rem; margin: 0 10px; opacity: 0.5;"></i>
        </div>

        <div class="full-player" id="fullPlayer">
            <div class="player-header">
                <span style="cursor: pointer;" onclick="togglePlayer()"><i class="fa-solid fa-chevron-down"></i> HIDE</span>
                <span style="color:var(--danger); font-weight: bold; display:flex; align-items:center; gap:5px;"><i class="fa-solid fa-circle" style="font-size:4px;"></i> LIVE SYNC</span>
            </div>
            <img src="" class="full-art" id="fullArt" style="width:100%; border-radius:15px; margin-bottom:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div style="text-align:center; margin-bottom:25px;">
                <h2 id="fullTitle" style="font-family:'Orbitron'; font-size:1rem; margin:0 0 5px 0; letter-spacing: 1px;">STARBOY</h2>
                <p id="fullArtist" style="font-size:0.65rem; color:#888; margin:0; letter-spacing: 2px;">THE WEEKND</p>
            </div>
            <div style="width:100%; height:4px; background:#1a1a1a; border-radius:10px; margin-bottom:20px; cursor:pointer; position:relative;" onclick="seek(event)">
                <div id="progressLine" style="height:100%; background:var(--danger); width:0%; border-radius:10px; transition: width 0.3s linear;"></div>
            </div>
            <div style="display:flex; justify-content:center; margin-bottom:25px;">
                <button onclick="togglePlay()" class="play-btn-circle"><i class="fa-solid fa-play" id="playIcon"></i></button>
            </div>
            <div style="display:flex; align-items:center; gap:15px; padding: 0 10px;">
                <i class="fa-solid fa-volume-high" style="font-size:0.75rem; color:#444;"></i>
                <input type="range" min="0" max="100" value="20" oninput="changeVolume(this.value)" style="flex:1; accent-color:var(--primary); height:3px; cursor:pointer;">
            </div>
        </div>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://calvyn-999ea-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false, player, isPlaying = false, pendingDeleteId = null;

        // --- Smooth UI Helpers ---
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 600);
            }, 3000);
        }

        function openModal(id, name) {
            pendingDeleteId = id;
            document.getElementById('modal-text').innerText = `ARE YOU SURE YOU WANT TO DELETE ${name.toUpperCase()}?`;
            const overlay = document.getElementById('modal-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { 
                overlay.style.opacity = '1';
                document.getElementById('confirmModal').style.transform = 'scale(1)';
            }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.style.opacity = '0';
            document.getElementById('confirmModal').style.transform = 'scale(0.7)';
            setTimeout(() => overlay.style.display = 'none', 400);
        }

        document.getElementById('confirm-delete-btn').onclick = () => {
            if(pendingDeleteId) {
                db.ref('roster/' + pendingDeleteId).remove();
                showToast("OPERATIVE REMOVED");
                closeModal();
            }
        };

        // --- YouTube API ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);

        function onYouTubeIframeAPIReady() {
            db.ref('settings/musicUrl').once('value', snapshot => {
                const vidId = snapshot.val() || 'XXYlFuWEuKI';
                player = new YT.Player('yt-player', {
                    height: '0', width: '0', videoId: vidId,
                    playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': vidId, 'controls': 0 },
                    events: {
                        'onReady': (e) => { e.target.setVolume(20); updateProgress(); },
                        'onStateChange': (e) => {
                            isPlaying = (e.data == YT.PlayerState.PLAYING);
                            document.getElementById('playIcon').className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
                        }
                    }
                });
            });
        }

        function togglePlayer() {
            const mini = document.getElementById('miniPlayer');
            const full = document.getElementById('fullPlayer');
            const isOpen = full.style.display === "flex";
            if(!isOpen) {
                full.style.display = "flex";
                mini.style.opacity = "0";
                setTimeout(() => mini.style.display = "none", 400);
            } else {
                full.style.animation = "playerPop 0.4s reverse forwards";
                setTimeout(() => {
                    full.style.display = "none";
                    full.style.animation = "";
                    mini.style.display = "flex";
                    setTimeout(() => mini.style.opacity = "1", 10);
                }, 400);
            }
        }

        function togglePlay() { isPlaying ? player.pauseVideo() : player.playVideo(); }
        function changeVolume(v) { if(player) player.setVolume(v); }
        function seek(e) { player.seekTo(player.getDuration() * (e.offsetX / e.currentTarget.offsetWidth)); }

        function updateProgress() {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const perc = (player.getCurrentTime() / player.getDuration()) * 100;
                    document.getElementById('progressLine').style.width = perc + "%";
                }
            }, 500);
        }

        // --- Database Sync ---
        db.ref('settings').on('value', (snapshot) => {
            const s = snapshot.val() || {};
            const b = document.getElementById('brand-name');
            b.innerText = s.brandName || "CALVYN";
            b.style.fontFamily = s.fontFamily || "'Orbitron'";
            document.body.style.backgroundImage = s.bgUrl ? `url('${s.bgUrl}')` : "url('https://img1.pic.in.th/images/calvyn.png')";
            
            if(s.musicUrl && player && player.loadVideoById) {
                if(player.getVideoData() && player.getVideoData().video_id !== s.musicUrl) {
                    player.loadVideoById(s.musicUrl);
                    const img = `https://i.ytimg.com/vi/${s.musicUrl}/maxresdefault.jpg`;
                    document.getElementById('miniArt').src = img;
                    document.getElementById('fullArt').src = img;
                }
            }
        });

        db.ref('roster').on('value', (snapshot) => {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            const data = snapshot.val();
            if (!data) return;
            Object.keys(data).forEach((id, index) => {
                const item = data[id];
                const card = document.createElement('div');
                card.className = 'member-card';
                card.style.animationDelay = (index * 0.08) + 's';
                card.innerHTML = `
                    <div class="avatar" style="background-image: url('${item.img || ''}')"></div>
                    <div class="info">
                        <div style="font-size: 0.6rem; color: var(--primary); font-family: 'Orbitron'; letter-spacing:1px;">${item.role.toUpperCase()}</div>
                        <div class="name">${item.name}</div>
                        <a href="${item.fb}" target="_blank" style="color: #444; text-decoration: none; font-size: 0.7rem; transition:0.3s;">VIEW PROFILE</a>
                    </div>
                    ${isAdmin ? `<button class="delete-btn" onclick="openModal('${id}', '${item.name}')"><i class="fas fa-trash"></i></button>` : ''}
                `;
                grid.appendChild(card);
            });
        });

        function updateSettings() {
            const vals = { brandName: 'editBrand', fontFamily: 'editFont', bgUrl: 'editBG', musicUrl: 'editMusic' };
            let data = {};
            for(let key in vals) {
                let v = document.getElementById(vals[key]).value;
                if(v) data[key] = v;
            }
            db.ref('settings').update(data);
            showToast("SYSTEM RE-INITIALIZED");
        }

        function saveToDB() {
            const name = document.getElementById('newName').value;
            if (name) {
                db.ref('roster').push({
                    name, img: document.getElementById('newImg').value,
                    fb: document.getElementById('newFB').value,
                    role: document.getElementById('newRole').value
                });
                ['newName','newImg','newFB'].forEach(id => document.getElementById(id).value = "");
                showToast("OPERATIVE REGISTERED");
            }
        }

        function showView(view) {
            const views = ['memberView', 'adminLoginView'];
            views.forEach(v => {
                const el = document.getElementById(v);
                if(v === view) {
                    el.style.display = "block";
                    setTimeout(() => el.classList.add('active-view'), 10);
                } else {
                    el.classList.remove('active-view');
                    setTimeout(() => el.style.display = "none", 500);
                }
            });
            document.getElementById('navMembers').classList.toggle('active', view === 'memberView');
            document.getElementById('navAdmin').classList.toggle('active', view === 'adminLoginView');
        }

        function handleLogin() {
            if (document.getElementById('loginUser').value === "calvyn" && document.getElementById('loginPass').value === "0808") {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                showView('memberView');
                showToast("ADMIN ACCESS GRANTED");
            } else { showToast("ACCESS DENIED"); }
        }

        document.addEventListener('click', () => { if(player && player.playVideo && !isPlaying) player.playVideo(); }, { once: true });
    </script>
</body>
</html>
