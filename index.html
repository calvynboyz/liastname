<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member List - DERECK168</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body {
            background: linear-gradient(to bottom, #2b0a0a, #121212);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .member-card {
            background-color: rgba(45, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
        }
        .member-card:hover {
            transform: translateY(-5px);
            background-color: rgba(70, 25, 25, 0.9);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .admin-box {
            background-color: #1a0d0d;
            border-radius: 1rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .login-btn {
            background-color: #f3d48b;
            color: #1a0d0d;
            font-weight: bold;
            transition: all 0.2s;
        }
        .login-btn:hover {
            background-color: #e2c275;
            transform: scale(1.02);
        }
        .hidden { display: none; }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc2626;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            font-size: 12px;
            display: none;
        }
        .admin-mode .delete-btn { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-10 py-5 sticky top-0 z-50 bg-[#2b0a0a]/80 backdrop-blur-md">
        <div class="text-2xl font-bold tracking-widest cursor-pointer" onclick="showView('memberView')">DERECK168</div>
        <div class="space-x-6 text-sm flex items-center">
            <button onclick="showView('memberView')" id="navMembers" class="text-gray-300 hover:text-white border-b-2 border-red-600 pb-1">Members</button>
            <button onclick="checkAdminStatus()" id="navAdmin" class="text-gray-400 hover:text-white transition">Admin</button>
            <button id="logoutBtn" onclick="logout()" class="hidden text-red-500 text-xs ml-4"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
        </div>
    </nav>

    <section id="memberView">
        <header class="text-center mt-10 mb-16 relative">
            <h2 class="text-5xl md:text-7xl font-black text-white/5 absolute left-1/2 -translate-x-1/2 -mt-4 md:-mt-8 tracking-[1rem] uppercase select-none">Memberlist</h2>
            <h1 class="text-4xl font-bold relative z-10 tracking-widest uppercase">Dereck</h1>
            
            <div class="mt-10 max-w-md mx-auto px-4 relative">
                <span class="absolute inset-y-0 left-7 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search code name..." 
                    class="w-full bg-black/40 border border-gray-700 rounded-full py-2.5 pl-10 pr-4 focus:outline-none focus:border-red-600 transition text-sm">
            </div>
        </header>

        <main id="memberGrid" class="max-w-6xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            </main>

        <footer id="pagination" class="flex justify-center items-center space-x-2 my-12"></footer>
    </section>

    <section id="adminLoginView" class="hidden animate-fadeIn">
        <div class="flex flex-col items-center justify-center mt-20 px-4">
            <h1 class="text-4xl font-bold tracking-widest mb-10 uppercase text-white/20">Admin System</h1>
            <div class="admin-box w-full max-w-sm p-10">
                <div class="text-center mb-8 border-b border-gray-700 pb-4">
                    <span class="text-[#f3d48b] text-sm font-bold uppercase tracking-widest">Login</span>
                </div>
                <div class="space-y-6">
                    <input type="text" id="adminEmail" placeholder="Username" class="w-full bg-black border border-gray-800 rounded py-2 px-3 focus:border-[#f3d48b] outline-none text-sm">
                    <input type="password" id="adminPass" placeholder="Password" class="w-full bg-black border border-gray-800 rounded py-2 px-3 focus:border-[#f3d48b] outline-none text-sm">
                    <button onclick="handleLogin()" class="login-btn w-full py-2.5 rounded text-sm uppercase">Login</button>
                </div>
            </div>
        </div>
    </section>

    <section id="adminDashboardView" class="hidden max-w-4xl mx-auto px-4 mt-10 animate-fadeIn">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold tracking-widest"><i class="fas fa-tools mr-2 text-red-600"></i> MANAGE MEMBERS</h2>
            <button onclick="showView('memberView')" class="bg-gray-800 px-4 py-2 rounded text-xs">ดูหน้าเว็บ</button>
        </div>

        <div class="admin-box p-6 mb-10">
            <h3 class="text-sm font-bold mb-4 text-[#f3d48b]">เพิ่มสมาชิกใหม่</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="newName" placeholder="ชื่อสมาชิก" class="bg-black border border-gray-800 rounded p-2 text-sm outline-none focus:border-red-600">
                <input type="text" id="newFB" placeholder="Link Facebook" class="bg-black border border-gray-800 rounded p-2 text-sm outline-none focus:border-red-600">
                <button onclick="addMember()" class="bg-red-600 hover:bg-red-700 rounded py-2 text-sm font-bold transition">บันทึกข้อมูล</button>
            </div>
        </div>
    </section>

    <script>
        // State
        let isAdmin = false;
        let members = [
            { id: 1, name: 'Taro Dereck', role: 'DERECK', fb: '#', img: 'https://i.pravatar.cc/150?u=1' },
            { id: 2, name: 'Park Dereck', role: 'DERECK', fb: '#', img: 'https://i.pravatar.cc/150?u=2' },
            { id: 3, name: 'Degan Dereck', role: 'DERECK', fb: '#', img: 'https://i.pravatar.cc/150?u=3' },
            { id: 4, name: 'Theboss Dereck', role: 'DERECK', fb: '#', img: 'https://i.pravatar.cc/150?u=4' },
            { id: 5, name: 'Alex Dereck', role: 'DERECK', fb: '#', img: 'https://i.pravatar.cc/150?u=5' }
        ];

        let filteredMembers = [...members];
        let currentPage = 1;
        const rowsPerPage = 10;

        // View Controller
        function showView(viewId) {
            ['memberView', 'adminLoginView', 'adminDashboardView'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
            
            // Sync Nav UI
            document.getElementById('navMembers').className = viewId === 'memberView' ? "text-gray-300 border-b-2 border-red-600 pb-1" : "text-gray-400";
            document.getElementById('navAdmin').className = (viewId === 'adminLoginView' || viewId === 'adminDashboardView') ? "text-gray-300 border-b-2 border-red-600 pb-1" : "text-gray-400";
        }

        function checkAdminStatus() {
            if (isAdmin) showView('adminDashboardView');
            else showView('adminLoginView');
        }

        // Login System
        function handleLogin() {
            const user = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            if (user === "calvyn088" && pass === "0808024062") {
                isAdmin = true;
                document.getElementById('logoutBtn').classList.remove('hidden');
                showView('adminDashboardView');
                updateDisplay();
            } else {
                alert("ข้อมูลไม่ถูกต้อง");
            }
        }

        function logout() {
            isAdmin = false;
            document.getElementById('logoutBtn').classList.add('hidden');
            showView('memberView');
            updateDisplay();
        }

        // Member Logic
        function addMember() {
            const name = document.getElementById('newName').value;
            const fb = document.getElementById('newFB').value;
            if(!name) return alert("กรุณาใส่ชื่อ");
            
            const newMember = {
                id: Date.now(),
                name: name,
                role: 'DERECK',
                fb: fb || '#',
                img: `https://i.pravatar.cc/150?u=${Date.now()}`
            };
            
            members.unshift(newMember);
            document.getElementById('newName').value = "";
            document.getElementById('newFB').value = "";
            updateDisplay();
            alert("เพิ่มสมาชิกเรียบร้อย");
        }

        function deleteMember(id) {
            if(confirm('ยืนยันการลบสมาชิกนี้?')) {
                members = members.filter(m => m.id !== id);
                updateDisplay();
            }
        }

        function updateDisplay() {
            filteredMembers = [...members];
            displayMembers(currentPage);
            setupPagination();
        }

        function displayMembers(page) {
            const grid = document.getElementById('memberGrid');
            grid.innerHTML = "";
            let start = rowsPerPage * (page - 1);
            let end = start + rowsPerPage;
            let items = filteredMembers.slice(start, end);

            items.forEach(m => {
                grid.innerHTML += `
                    <div class="member-card rounded-2xl p-6 text-center ${isAdmin ? 'admin-mode' : ''}">
                        <button onclick="deleteMember(${m.id})" class="delete-btn hover:bg-red-700 transition"><i class="fas fa-times"></i></button>
                        <div class="w-20 h-20 mx-auto mb-4 rounded-full border-2 border-red-600 overflow-hidden bg-gray-900">
                            <img src="${m.img}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-sm font-semibold truncate">${m.name}</h3>
                        <p class="text-[10px] text-gray-500 mb-4 tracking-widest uppercase">${m.role}</p>
                        <a href="${m.fb}" target="_blank" class="text-blue-500 hover:text-blue-400 text-xl"><i class="fab fa-facebook"></i></a>
                    </div>
                `;
            });
        }

        function setupPagination() {
            const paginationEl = document.getElementById('pagination');
            paginationEl.innerHTML = "";
            let pageCount = Math.ceil(filteredMembers.length / rowsPerPage);
            for (let i = 1; i <= pageCount; i++) {
                let btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `w-8 h-8 rounded-full text-sm transition ${currentPage === i ? 'bg-red-600 text-white' : 'hover:bg-white/10 text-gray-400'}`;
                btn.onclick = () => { currentPage = i; displayMembers(i); setupPagination(); };
                paginationEl.appendChild(btn);
            }
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            filteredMembers = members.filter(m => m.name.toLowerCase().includes(term));
            currentPage = 1;
            displayMembers(1);
            setupPagination();
        }

        // Init
        updateDisplay();
    </script>
</body>
</html>
