<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALVYNBOYZ</title>
    
    <link rel="icon" type="image/png" href="https://img1.pic.in.th/images/cgtlogo2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #f3d48b;
            --bg-dark: #0a0a0b;
            --card-bg: rgba(20, 20, 25, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --danger: #ff4757;
            --success: #2ed573;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            color: #fff;
            font-family: 'Rajdhani', 'Kanit', sans-serif;
            margin: 0; min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.8s ease;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* Jumpscare Video Overlay */
        #video-jumpscare {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 999999;
            display: none;
            pointer-events: none;
        }
        #video-jumpscare iframe { width: 100%; height: 100%; border: none; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.1s infinite; }

        nav { 
            display: flex; justify-content: space-between; padding: 15px 5%; 
            background: rgba(0,0,0,0.8); align-items: center; position: sticky; 
            top: 0; z-index: 100; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color);
        }
        #brand-name { font-weight: 900; letter-spacing: 3px; font-family: 'Orbitron'; font-size: 1.4rem; color: var(--primary); text-shadow: 0 0 15px rgba(243, 212, 139, 0.3); }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }

        label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-family: 'Orbitron'; color: var(--primary); opacity: 0.8; }

        input, select { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-color); padding: 14px; 
            color: #fff; border-radius: 12px; font-family: 'Kanit'; outline: none; width: 100%;
            transition: var(--transition);
        }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.6); box-shadow: 0 0 15px rgba(243, 212, 139, 0.15); }

        .btn-action { 
            background: var(--primary); color: #000; border: none; padding: 14px 25px; 
            border-radius: 12px; font-weight: 700; font-family: 'Orbitron'; cursor: pointer; 
            transition: var(--transition); display: inline-flex; align-items: center; gap: 10px;
            justify-content: center; width: 100%; letter-spacing: 1px;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(243, 212, 139, 0.4); filter: brightness(1.1); }
        .btn-action:active { transform: translateY(-1px); }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; width: auto; border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: var(--primary); }

        /* Custom Dialog UI */
        #custom-dialog-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000000;
        }
        .dialog-box {
            background: #15151a; border: 1px solid var(--primary); border-radius: 20px;
            padding: 30px; width: 90%; max-width: 400px; text-align: center;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .dialog-title { font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; color: var(--primary); margin-bottom: 15px; }
        .dialog-msg { opacity: 0.9; margin-bottom: 25px; line-height: 1.5; }

        .section-title { 
            font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 900; 
            letter-spacing: 6px; color: #fff; margin: 60px 0 25px; 
            display: flex; align-items: center; gap: 20px;
        }
        .section-title::after { content: ""; height: 2px; flex-grow: 1; background: linear-gradient(90deg, var(--primary), transparent); opacity: 0.3; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .member-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 20px; display: flex; align-items: center; gap: 20px;
            border-radius: 18px; position: relative; transition: var(--transition);
            backdrop-filter: blur(10px);
        }
        .member-card:hover { 
            transform: translateY(-8px); border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            background: rgba(30, 30, 40, 0.8);
        }
        
        .avatar-box { 
            width: 75px; height: 75px; background-size: cover; 
            background-position: center; border-radius: 50%; 
            border: 3px solid var(--primary); flex-shrink: 0;
            box-shadow: 0 0 15px rgba(243, 212, 139, 0.2);
        }

        .role-tag { 
            font-family: 'Orbitron'; font-size: 0.65rem; font-weight: 900; 
            padding: 3px 10px; border-radius: 20px; background: var(--primary); color: #000;
            margin-bottom: 8px; display: inline-block; letter-spacing: 1px;
        }

        .admin-controls { display: flex; flex-direction: column; gap: 12px; padding-left: 15px; border-left: 1px solid var(--border-color); }
        .ctrl-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; transition: var(--transition); color: rgba(255,255,255,0.4); }
        .ctrl-btn:hover { color: var(--primary); transform: scale(1.2); }
        .ctrl-btn.del-btn:hover { color: var(--danger); }

        .toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--primary); color: #000; padding: 12px 30px; 
            border-radius: 50px; font-weight: 900; font-family: 'Orbitron';
            z-index: 10000; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 10px;
        }

        .hidden { display: none !important; }

        .key-display {
            background: rgba(243, 212, 139, 0.05); padding: 15px; border-radius: 12px;
            margin-top: 20px; font-family: 'Orbitron'; color: var(--primary);
            border: 1px dashed var(--primary); word-break: break-all; font-size: 0.9rem;
        }

        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="mainBody">

    <div id="custom-dialog-overlay">
        <div class="dialog-box">
            <div id="dialog-title" class="dialog-title">CONFIRM</div>
            <div id="dialog-msg" class="dialog-msg">ต้องการดำเนินการนี้ใช่หรือไม่?</div>
            <div id="dialog-actions" style="display: flex; gap: 10px;">
                <button id="dialog-cancel" class="btn-action btn-secondary" style="flex:1">ยกเลิก</button>
                <button id="dialog-confirm" class="btn-action" style="flex:1">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="video-jumpscare"></div>

    <nav>
        <div id="brand-name">ONELESS CGT</div>
        <div style="display: flex; gap: 15px;">
            <button onclick="showView('memberView')" class="btn-action btn-secondary"><i class="fas fa-home"></i> HOME</button>
            <button onclick="checkAdminStatus()" id="navAdmin" class="btn-action"><i class="fas fa-user-shield"></i> ADMIN</button>
        </div>
    </nav>

    <div class="container">
        <section id="adminLoginView" class="hidden fade-in" style="padding-top: 5vh;">
            <div style="max-width: 450px; margin: auto; text-align: center;" class="glass-panel">
                <div style="margin-bottom: 25px;">
                    <i class="fas fa-shield-halved" style="font-size: 3.5rem; color: var(--primary);"></i>
                </div>
                <h2 style="font-family:'Orbitron'; letter-spacing: 5px;">ACCESS KEY</h2>
                <p style="opacity: 0.5; font-size: 0.9rem; margin-bottom: 25px;">กรุณากรอกรหัสผ่านเพื่อเข้าสู่ระบบหลังบ้าน</p>
                
                <input type="text" id="accessKeyInput" placeholder="ENTER ACCESS KEY" style="margin-bottom: 20px; text-align: center; letter-spacing: 2px;">
                <button onclick="handleLoginByKey()" class="btn-action" style="margin-bottom: 30px;">AUTHENTICATE</button>
                
                <hr style="opacity: 0.05; margin-bottom: 25px;">
                <p style="font-size: 0.75rem; opacity: 0.4; font-family: 'Orbitron';">GENERATE NEW KEY</p>
                <input type="password" id="genPass" placeholder="ADMIN PASSWORD" style="margin-bottom: 15px; text-align: center;">
                <button onclick="generateNewKey()" class="btn-action btn-secondary" style="width: 100%; font-size: 0.8rem;">CREATE KEY</button>
                <div id="newKeyResult" class="hidden key-display"></div>
            </div>
        </section>

        <section id="memberView" class="fade-in">
            <div id="adminPanel" class="hidden">
                <div class="glass-panel" style="border-top: 4px solid var(--primary);">
                    <h3 style="color: var(--primary); font-family: 'Orbitron'; margin-top:0;"><i class="fas fa-sliders"></i> REAL-TIME CONFIGURATION</h3>
                    
                    <div class="admin-grid" style="margin-bottom: 30px;">
                        <div>
                            <label>THEME COLOR</label>
                            <input type="color" id="configColor" oninput="updateSetting('primary', this.value)" style="height: 50px; padding: 5px; cursor: pointer;">
                        </div>
                        <div>
                            <label>BACKGROUND URL</label>
                            <input type="text" id="configBG" placeholder="https://image-link.com" onchange="updateSetting('bg', this.value)">
                        </div>
                        <div>
                            <label>FOUNDER LABEL</label>
                            <input type="text" id="configHeadFounder" placeholder="FOUNDERS" oninput="updateSetting('headFounder', this.value)">
                        </div>
                        <div>
                            <label>LEADER LABEL</label>
                            <input type="text" id="configHeadLeader" placeholder="LEADERS" oninput="updateSetting('headLeader', this.value)">
                        </div>
                    </div>

                    <div class="glass-panel" style="background: rgba(0,0,0,0.3); border-radius: 15px; margin-bottom: 0;">
                        <h4 id="formTitle" style="font-family: 'Orbitron'; color: #fff; margin-top:0;">MEMBER MANAGEMENT</h4>
                        <div class="admin-grid" style="margin-bottom: 20px;">
                            <input type="hidden" id="editMemberId">
                            <div>
                                <label>FULL NAME</label>
                                <input type="text" id="newName" placeholder="ชื่อ-นามสกุล">
                            </div>
                            <div>
                                <label>AVATAR URL</label>
                                <input type="text" id="newImg" placeholder="https://...">
                            </div>
                            <div>
                                <label>FACEBOOK URL</label>
                                <input type="text" id="newFB" placeholder="https://facebook.com/...">
                            </div>
                            <div>
                                <label>POSITION</label>
                                <select id="newRole">
                                    <option value="founder">Founder</option>
                                    <option value="leader">Leader</option>
                                    <option value="member">Member</option>
                                </select>
                            </div>
                        </div>
                        <div style="display: flex; gap: 15px;">
                            <button onclick="saveMember()" id="saveBtn" class="btn-action" style="flex:2">SAVE MEMBER DATA</button>
                            <button onclick="resetForm()" class="btn-action btn-secondary" style="flex:1">RESET</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="rosterDisplay">
                <div id="section-founder">
                    <div class="section-title" id="titleFounder">FOUNDERS</div>
                    <div class="grid" id="founderGrid"></div>
                </div>
                <div id="section-leader">
                    <div class="section-title" id="titleLeader">LEADERS</div>
                    <div class="grid" id="leaderGrid"></div>
                </div>
                <div id="section-member">
                    <div class="section-title" id="titleMember">MEMBERS</div>
                    <div class="grid" id="memberGrid"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            databaseURL: "https://calvyn-999ea-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false;

        // --- Custom UI Utilities ---
        function showToast(m) {
            const t = document.createElement('div'); 
            t.className = 'toast fade-in';
            t.innerHTML = `<i class="fas fa-check-circle"></i> ${m}`; 
            document.body.appendChild(t);
            setTimeout(() => { 
                t.style.opacity = '0'; 
                t.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => t.remove(), 500); 
            }, 3000);
        }

        function customConfirm(title, msg, onConfirm) {
            const overlay = document.getElementById('custom-dialog-overlay');
            const t = document.getElementById('dialog-title');
            const m = document.getElementById('dialog-msg');
            const cBtn = document.getElementById('dialog-confirm');
            const xBtn = document.getElementById('dialog-cancel');
            
            t.innerText = title;
            m.innerText = msg;
            overlay.style.display = 'flex';
            
            const close = () => { overlay.style.display = 'none'; };
            
            cBtn.onclick = () => { onConfirm(); close(); };
            xBtn.onclick = close;
        }

        function customAlert(title, msg) {
            const overlay = document.getElementById('custom-dialog-overlay');
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-msg').innerText = msg;
            document.getElementById('dialog-cancel').style.display = 'none';
            overlay.style.display = 'flex';
            document.getElementById('dialog-confirm').onclick = () => {
                overlay.style.display = 'none';
                document.getElementById('dialog-cancel').style.display = 'block';
            };
        }

        function triggerJumpscare() {
            const container = document.getElementById('video-jumpscare');
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/u8UdAAX_n28?autoplay=1&controls=0&start=13&mute=0" allow="autoplay"></iframe>`;
            container.style.display = 'block';
            document.body.classList.add('shaking');

            setTimeout(() => {
                container.style.display = 'none';
                container.innerHTML = '';
                document.body.classList.remove('shaking');
            }, 4000);
        }

        function showView(v) {
            document.getElementById('memberView').classList.toggle('hidden', v !== 'memberView');
            document.getElementById('adminLoginView').classList.toggle('hidden', v !== 'adminLoginView');
        }

        // --- KEY SYSTEM ---
        function generateNewKey() {
            const pass = document.getElementById('genPass').value;
            if(pass === "calvyn0808") {
                const newKey = 'CALVYN-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                db.ref('validKeys/' + newKey).set(true);
                const res = document.getElementById('newKeyResult');
                res.innerHTML = `COPY THIS KEY:<br><strong style="font-size:1.2rem">${newKey}</strong>`;
                res.classList.remove('hidden');
                document.getElementById('genPass').value = "";
                showToast("SUCCESSFULLY GENERATED");
            } else {
                triggerJumpscare();
            }
        }

        function handleLoginByKey() {
            const key = document.getElementById('accessKeyInput').value.trim();
            if(!key) return showToast("กรุณาใส่ KEY");

            db.ref('validKeys/' + key).once('value', snap => {
                if(snap.exists()) {
                    isAdmin = true;
                    document.getElementById('adminPanel').classList.remove('hidden');
                    document.getElementById('navAdmin').innerHTML = '<i class="fas fa-power-off"></i> LOGOUT';
                    showView('memberView');
                    showToast("ADMIN ACCESS GRANTED");
                    renderRoster();
                } else {
                    triggerJumpscare();
                }
            });
        }

        function checkAdminStatus() { 
            if(isAdmin) {
                customConfirm("LOGOUT", "คุณต้องการออกจากระบบแอดมินใช่หรือไม่?", () => {
                    location.reload();
                });
            } else {
                showView('adminLoginView');
            }
        }

        // --- SETTINGS REALTIME SYNC ---
        function updateSetting(key, value) {
            if(!isAdmin) return;
            db.ref('settings/' + key).set(value);
        }

        db.ref('settings').on('value', snap => {
            const s = snap.val() || {};
            if(s.primary) {
                document.documentElement.style.setProperty('--primary', s.primary);
                document.getElementById('configColor').value = s.primary;
            }
            if(s.bg) {
                document.body.style.backgroundImage = `linear-gradient(rgba(10,10,11,0.7), rgba(10,10,11,0.7)), url('${s.bg}')`;
                document.getElementById('configBG').value = s.bg;
            }
            document.getElementById('titleFounder').innerText = s.headFounder || "FOUNDERS";
            document.getElementById('configHeadFounder').value = s.headFounder || "";
            document.getElementById('titleLeader').innerText = s.headLeader || "LEADERS";
            document.getElementById('configHeadLeader').value = s.headLeader || "";
        });

        // --- ROSTER REALTIME SYNC ---
        function renderRoster() {
            db.ref('roster').on('value', snap => {
                const grids = { founder: 'founderGrid', leader: 'leaderGrid', member: 'memberGrid' };
                Object.values(grids).forEach(id => document.getElementById(id).innerHTML = "");
                
                const data = snap.val();
                if(!data) return;

                Object.keys(data).forEach((id, index) => {
                    const item = data[id];
                    const card = document.createElement('div');
                    card.className = 'member-card fade-in';
                    card.style.animationDelay = `${index * 0.05}s`;
                    card.innerHTML = `
                        <div class="avatar-box" style="background-image: url('${item.img || 'https://img1.pic.in.th/images/cgtlogo2.png'}')"></div>
                        <div style="flex:1">
                            <span class="role-tag">${item.role.toUpperCase()}</span>
                            <div style="font-weight:700; font-family:'Orbitron'; font-size:1.1rem; letter-spacing:1px; margin-bottom:4px;">${item.name}</div>
                            <a href="${item.fb}" target="_blank" style="font-size:0.75rem; color:var(--primary); text-decoration:none; font-weight:700;">
                                <i class="fab fa-facebook"></i> FACEBOOK PROFILE
                            </a>
                        </div>
                        ${isAdmin ? `
                        <div class="admin-controls">
                            <button class="ctrl-btn" title="แก้ไข" onclick="prepareEdit('${id}', '${item.name}', '${item.img}', '${item.fb}', '${item.role}')"><i class="fas fa-pen-to-square"></i></button>
                            <button class="ctrl-btn del-btn" title="ลบ" onclick="deleteMember('${id}')"><i class="fas fa-trash-can"></i></button>
                        </div>` : ''}
                    `;
                    if(grids[item.role]) document.getElementById(grids[item.role]).appendChild(card);
                });
            });
        }

        renderRoster();

        // --- MEMBER CRUD FUNCTIONS ---
        function saveMember() {
            if(!isAdmin) return showToast("สิทธิ์ไม่ถูกต้อง");
            const id = document.getElementById('editMemberId').value;
            const memberData = {
                name: document.getElementById('newName').value.trim(),
                img: document.getElementById('newImg').value.trim(),
                fb: document.getElementById('newFB').value.trim(),
                role: document.getElementById('newRole').value
            };
            
            if(!memberData.name) return customAlert("ERROR", "กรุณากรอกชื่อสมาชิก");

            if(id) {
                db.ref('roster/' + id).update(memberData)
                    .then(() => showToast("UPDATED SUCCESSFULLY"))
                    .catch(e => showToast("ERROR OCCURRED"));
            } else {
                db.ref('roster').push(memberData)
                    .then(() => showToast("NEW MEMBER ADDED"))
                    .catch(e => showToast("ERROR OCCURRED"));
            }
            resetForm();
        }

        function prepareEdit(id, name, img, fb, role) {
            document.getElementById('editMemberId').value = id;
            document.getElementById('newName').value = name;
            document.getElementById('newImg').value = img;
            document.getElementById('newFB').value = fb;
            document.getElementById('newRole').value = role;
            document.getElementById('saveBtn').innerText = "UPDATE MEMBER INFO";
            document.getElementById('formTitle').innerText = "EDITING: " + name.toUpperCase();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteMember(id) {
            customConfirm("DELETE MEMBER", "คุณแน่ใจหรือไม่ว่าต้องการลบสมาชิกท่านนี้ออกจากระบบ?", () => {
                db.ref('roster/' + id).remove()
                    .then(() => showToast("MEMBER REMOVED"));
            });
        }

        function resetForm() {
            document.getElementById('editMemberId').value = "";
            document.getElementById('newName').value = "";
            document.getElementById('newImg').value = "";
            document.getElementById('newFB').value = "";
            document.getElementById('saveBtn').innerText = "SAVE MEMBER DATA";
            document.getElementById('formTitle').innerText = "MEMBER MANAGEMENT";
        }
    </script>
</body>
</html>
